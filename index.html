<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="宿泊収支">
<title>宿泊収支管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;font-size:14px;background:#f5f5f0;color:#1a1a1a;min-height:100vh}

/* ─── 認証画面 ─── */
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.auth-box{background:#fff;border-radius:16px;padding:48px 40px;text-align:center;max-width:360px;width:100%;border:1px solid #e0e0d8;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.auth-box h1{font-size:22px;font-weight:700;margin-bottom:8px}
.auth-box p{font-size:13px;color:#888;margin-bottom:32px;line-height:1.7}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;background:#111;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

/* ─── トップバー（黒帯） ─── */
.topbar{background:#111;border-bottom:none;padding:6px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:4px;flex:1;min-width:0}
.topbar-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
#propSel,#yearSel{background:#222;color:#f5f4f0;border:1px solid #444;border-radius:6px;padding:5px 10px;font-size:13px;font-family:inherit}
#propSel{min-width:80px;max-width:140px}
#yearSel{min-width:74px}
.icon-btn{width:32px;height:32px;border-radius:6px;border:1px solid #444;background:transparent;color:#eee;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.icon-btn:hover{background:#333}
.icon-btn.active-page{background:#1a56db;border-color:#1a56db}
select,input[type=number],input[type=text],input[type=date],input[type=month]{border:.5px solid #d0d0c8;border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;background:#fff}
.drive-bar{background:#f5f5f0;border-bottom:.5px solid #e0e0d8;padding:4px 10px;display:flex;align-items:center;gap:6px;font-size:11px;color:#666}
.drive-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.drive-dot.ok{background:#4caf50}
.drive-dot.ng{background:#f44336}
.drive-dot.syncing{background:#ff9800}
#syncBtn{padding:2px 8px;font-size:11px;border:.5px solid #d0d0c8;border-radius:4px;background:#fff;cursor:pointer;margin-left:4px}

/* ─── アイコンボタン（不動産アプリと同一） ─── */
.icon-btn{width:32px;height:32px;border-radius:6px;border:.5px solid #d0d0c8;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.icon-btn:hover{background:#f5f5f0;color:#333}
.icon-btn.active-page{background:#dbeafe;border-color:#93c5fd}

/* ─── ナビ ─── */
.nav{display:flex;gap:2px;background:#fff;border-bottom:.5px solid #e0e0d8;padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nb{padding:9px 14px;font-size:13px;font-weight:500;border:none;background:transparent;color:#666;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit}
.nb:hover:not(.active){color:#333}
.nb.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:600}

/* ─── コンテンツ ─── */
.content{padding:12px;max-width:100%;margin:0 auto}
@media(min-width:768px){.content{max-width:1020px;margin:0 auto;padding:16px}}

/* ─── カード ─── */
.card{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:12px;border:.5px solid #e0e0d8}
.card-title{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}

/* ─── サマリーグリッド ─── */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
@media(min-width:480px){.summary-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.summary-grid{grid-template-columns:repeat(5,1fr)}}
.summary-item{background:#f9f9f7;border-radius:8px;padding:10px 12px;border:.5px solid #e0e0d8}
.summary-label{font-size:10px;color:#999;font-weight:600;margin-bottom:3px;letter-spacing:.04em}
.summary-val{font-size:18px;font-weight:700;letter-spacing:-.02em}

/* ─── CF推移テーブル（縦=項目、横=月） ─── */
.cf-tbl{width:100%;border-collapse:collapse;font-size:11px}
.cf-tbl th{padding:5px 6px;border-bottom:2px solid #eee;color:#aaa;font-weight:700;white-space:nowrap;text-align:right}
.cf-tbl th.item-col{text-align:left;min-width:80px}
.cf-tbl td{padding:5px 6px;border-bottom:1px solid #f0efeb;white-space:nowrap;text-align:right}
.cf-tbl td.item-col{text-align:left;color:#555;position:sticky;left:0;z-index:1;background:#fff}
.cf-tbl tr.cf-section td.item-col{background:#f5f5f0}
.cf-tbl tr.cf-profit td.item-col{background:#f0f4f0}
.cf-tbl td.val-bold{font-weight:700}
.cf-tbl tr.cf-section td{background:#f5f5f0;font-weight:700;font-size:11px;color:#333}
.cf-tbl tr.cf-profit td{background:#f0f4f0}
.cf-tbl tr.cf-profit td.item-col{color:#333;font-weight:700}
.cf-tbl tr.cf-minus td{background:#f0f4f0}
.cf-tbl tr.cf-minus td.item-col{color:#333;font-weight:700}
.cf-tbl tr.cf-sub td.item-col{padding-left:16px;color:#888;font-size:11px}
.cf-tbl tr.dim td{opacity:.35}

/* ─── 汎用テーブル ─── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:7px 10px;border-bottom:2px solid #eee;color:#aaa;font-weight:700;font-size:11px}
.tbl td{padding:9px 10px;border-bottom:1px solid #f0efeb;vertical-align:middle}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* ─── ボタン ─── */
.btn{padding:8px 14px;font-size:13px;font-weight:500;border:.5px solid #d0d0c8;background:#fff;color:#333;border-radius:7px;cursor:pointer;font-family:inherit}
.btn:hover{background:#f5f5f5}
.btn.primary{border:none;background:#111;color:#fff}
.btn.primary:hover{background:#333}
.btn.sm{padding:4px 10px;font-size:11px}
.btn.danger{color:#b71c1c;border-color:#f0c0c0}

/* ─── バッジ ─── */
.bdg{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
.bdg.b{background:#e8f0fe;color:#1a56db}
.bdg.g{background:#e6f4ea;color:#2e7d32}
.bdg.y{background:#fff8e1;color:#b45309}
.bdg.p{background:#f3e8ff;color:#7c3aed}

/* ─── プログレスバー ─── */
.pbar{height:6px;background:#eee;border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px}

/* ─── モーダル ─── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.modal-box h3{font-size:16px;font-weight:700;margin-bottom:14px}
.form-label{font-size:11px;color:#666;font-weight:700;display:block;margin-bottom:3px}
.form-row{margin-bottom:10px;width:100%}
.form-row select,.form-row input{width:100%}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* ─── ドロップゾーン ─── */
.dropzone{border:2px dashed #ccc;border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;background:#fafaf8;transition:all .15s}
.dropzone.drag{border-color:#111;background:#f0efea}

/* ─── 色 ─── */
.c-red{color:#b71c1c}.c-org{color:#b45309}.c-grn{color:#1a7a3c}.c-pur{color:#6d28d9}.c-gry{color:#aaa}.fw7{font-weight:700}
.type-badge-purchase{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700;background:#e8f0fe;color:#1a56db}
.type-badge-sublease{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700;background:#f3e8ff;color:#7c3aed}
.info-banner{padding:10px 12px;background:#e8f0fe;border-radius:8px;font-size:12px;color:#1a56db;line-height:1.7;margin-bottom:12px}
.warn-banner{padding:10px 12px;background:#fff8e1;border-radius:8px;font-size:13px;margin-top:12px}

/* ─── 稼働カレンダー的な表示 ─── */
.occ-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px}
.occ-item{background:#f9f9f7;border-radius:8px;padding:10px 12px;border:.5px solid #e0e0d8;text-align:center}
.occ-month{font-size:11px;color:#999;margin-bottom:4px}
.occ-rate{font-size:18px;font-weight:700}
.occ-nights{font-size:11px;color:#aaa}
</style>
</head>
<body>

<!-- 認証画面 -->
<div id="authScreen">
  <div class="auth-box">
    <div style="font-size:40px;margin-bottom:12px">🏠</div>
    <h1>宿泊収支管理</h1>
    <p>Googleアカウントでログインすると<br>PC・iPhoneで同じデータを共有できます</p>
    <button class="google-btn" onclick="handleAuth()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Googleでログイン
    </button>
  </div>
</div>

<!-- アプリ画面 -->
<div id="appScreen" style="display:none">
  <!-- トップバー（不動産アプリ準拠） -->
  <div class="topbar">
    <div class="topbar-left">
      <select id="propSel" onchange="switchProp()"></select>
      <select id="yearSel" onchange="renderCurrent()"></select>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="iconUpload"   onclick="showIconPage('upload')"  title="取込">📤</button>
      <button class="icon-btn" id="iconFiles"    onclick="showIconPage('files')"   title="ファイル一覧">📁</button>
      <button class="icon-btn" id="iconSettings" onclick="showIconPage('settings')" title="設定">⚙️</button>
    </div>
  </div>
  <!-- ドライブバー -->
  <div class="drive-bar">
    <div class="drive-dot" id="driveDot"></div>
    <span id="driveStatus">未接続</span>
    <span id="lastSyncTime" style="font-size:10px;color:#aaa;margin-left:8px"></span>
    <button id="syncBtn" onclick="manualSync()">↻ 更新</button>
  </div>
  <!-- ナビ -->
  <div class="nav" id="mainNav"></div>
  <!-- コンテンツ -->
  <div class="content" id="pages"></div>
</div>

<!-- ─── モーダル群 ─── -->

<!-- PDF解析結果・振り分け確認モーダル -->
<div class="modal" id="uploadResultModal"><div class="modal-box" style="max-width:560px">
  <h3>📄 解析結果・振り分け確認</h3>
  <div id="uploadResultBody"></div>
  <div style="display:flex;gap:8px;margin-top:14px">
    <button class="btn primary" onclick="confirmUploadResult()">この内容で登録</button>
    <button class="btn" onclick="closeModal('uploadResultModal')">キャンセル</button>
  </div>
</div></div>

<!-- 物件追加 -->
<div class="modal" id="addPropModal"><div class="modal-box">
  <h3>物件を追加</h3>
  <div class="form-row"><label class="form-label">物件名</label><input type="text" id="np-name" placeholder="押上戸建"></div>
  <div class="form-row"><label class="form-label">物件タイプ</label>
    <select id="np-type" onchange="toggleSubleaseFields()">
      <option value="purchase">購入</option>
      <option value="sublease">転貸（サブリース）</option>
    </select></div>
  <div class="form-row"><label class="form-label">運営開始日</label><input type="date" id="np-start"></div>
  <div id="sublease-fields" style="display:none">
    <div style="font-size:12px;font-weight:700;color:#7c3aed;margin-bottom:8px;margin-top:4px">転貸設定</div>
    <div class="form-grid">
      <div class="form-row"><label class="form-label">初期家賃（円/月）</label><input type="number" id="np-rent" placeholder="150000"></div>
      <div class="form-row"><label class="form-label">開始年月</label><input type="month" id="np-rent-from"></div>
    </div>
  </div>
  <p style="font-size:11px;color:#aaa;margin-bottom:12px">※ ローンは「借入管理」から登録できます</p>
  <div style="display:flex;gap:8px">
    <button class="btn primary" onclick="addProp()">追加</button>
    <button class="btn" onclick="closeModal('addPropModal')">キャンセル</button>
  </div>
</div></div>

<!-- キーワード管理 -->
<div class="modal" id="aliasModal"><div class="modal-box">
  <h3>マッチングキーワードを管理</h3>
  <p style="font-size:13px;color:#888;margin-bottom:12px;line-height:1.7" id="aliasDesc"></p>
  <div id="aliasList" style="margin-bottom:12px"></div>
  <div class="info-banner">CSV「リスティング」列にキーワードが<b>部分一致</b>すればこの物件に自動割当されます。</div>
  <label class="form-label">キーワードを追加</label>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <input type="text" id="newAlias" placeholder="例: 浅草・押上エリア" style="flex:1">
    <button class="btn primary" onclick="addAlias()">追加</button>
  </div>
  <button class="btn primary" style="width:100%" onclick="closeModal('aliasModal')">完了</button>
</div></div>

<!-- 家賃履歴 -->
<div class="modal" id="rentModal"><div class="modal-box">
  <h3>家賃履歴を管理</h3>
  <p style="font-size:13px;color:#888;margin-bottom:12px" id="rentModalDesc"></p>
  <div id="rentHistoryList" style="margin-bottom:14px"></div>
  <div style="padding:12px;background:#f9f9f7;border-radius:8px;margin-bottom:12px">
    <div style="font-size:12px;font-weight:700;margin-bottom:8px">新しい家賃を追加</div>
    <div class="form-grid">
      <div class="form-row"><label class="form-label">開始年月</label><input type="month" id="rent-from"></div>
      <div class="form-row"><label class="form-label">終了年月（空欄=永続）</label><input type="month" id="rent-to"></div>
    </div>
    <div class="form-row"><label class="form-label">月額家賃（円）</label><input type="number" id="rent-amount" placeholder="150000"></div>
    <button class="btn primary" onclick="addRentHistory()">追加</button>
  </div>
  <button class="btn primary" style="width:100%" onclick="closeModal('rentModal')">完了</button>
</div></div>

<!-- 借入追加 -->
<div class="modal" id="addLoanModal"><div class="modal-box">
  <h3>借入を追加</h3>
  <div class="form-row"><label class="form-label">借入種別</label>
    <select id="loan-scope" onchange="toggleLoanScope()">
      <option value="property">物件個別</option>
      <option value="overall">全体（運転資金等）</option>
    </select></div>
  <div class="form-row" id="loan-prop-row"><label class="form-label">対象物件</label>
    <select id="loan-prop"><option value="">選択してください</option></select></div>
  <div class="form-row"><label class="form-label">借入名称</label><input type="text" id="loan-name" placeholder="購入ローン / リフォームローン 等"></div>
  <div class="form-grid">
    <div class="form-row"><label class="form-label">借入金額（円）</label><input type="number" id="loan-principal" placeholder="5000000"></div>
    <div class="form-row"><label class="form-label">金利（%）</label><input type="number" id="loan-rate" value="1.8" step="0.1"></div>
  </div>
  <div class="form-grid">
    <div class="form-row"><label class="form-label">返済年数</label><input type="number" id="loan-years" value="20"></div>
    <div class="form-row"><label class="form-label">返済開始日</label><input type="date" id="loan-start"></div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn primary" onclick="addLoan()">追加</button>
    <button class="btn" onclick="closeModal('addLoanModal')">キャンセル</button>
  </div>
</div></div>

<!-- 経費追加 -->
<div class="modal" id="addExpModal"><div class="modal-box">
  <h3>経費を追加</h3>
  <div class="form-row"><label class="form-label">物件</label>
    <select id="ae-prop"><option value="">選択してください</option></select></div>
  <div class="form-grid">
    <div class="form-row"><label class="form-label">年</label><input type="number" id="ae-year" value="2024"></div>
    <div class="form-row"><label class="form-label">月</label><input type="number" id="ae-month" value="1" min="1" max="12"></div>
  </div>
  <div class="form-row"><label class="form-label">カテゴリ</label>
    <select id="ae-cat">
      <option>OTA手数料</option><option>運営代行費</option><option>清掃費</option>
      <option>水道光熱費</option><option>修繕費</option><option>消耗品費</option><option>その他経費</option>
    </select></div>
  <div class="form-row"><label class="form-label">金額（円）</label><input type="number" id="ae-amount" placeholder="85000"></div>
  <div class="form-row"><label class="form-label">備考</label><input type="text" id="ae-note"></div>
  <div class="form-row" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff8e1;border-radius:8px">
    <input type="checkbox" id="ae-initial" style="width:auto;margin:0">
    <label for="ae-initial" style="font-size:13px;color:#b45309;font-weight:600;cursor:pointer;margin:0">初期費用として扱う</label>
  </div>
  <div style="display:flex;gap:8px;margin-top:10px">
    <button class="btn primary" onclick="addExp()">追加</button>
    <button class="btn" onclick="closeModal('addExpModal')">キャンセル</button>
  </div>
</div></div>

<!-- 経費編集 -->
<div class="modal" id="editExpModal"><div class="modal-box">
  <h3>経費を編集</h3>
  <input type="hidden" id="ee-id">
  <div class="form-grid">
    <div class="form-row"><label class="form-label">年</label><input type="number" id="ee-year"></div>
    <div class="form-row"><label class="form-label">月</label><input type="number" id="ee-month" min="1" max="12"></div>
  </div>
  <div class="form-row"><label class="form-label">カテゴリ</label>
    <select id="ee-cat">
      <option>OTA手数料</option><option>運営代行費</option><option>清掃費</option>
      <option>水道光熱費</option><option>修繕費</option><option>消耗品費</option><option>その他経費</option>
    </select></div>
  <div class="form-row"><label class="form-label">金額（円）</label><input type="number" id="ee-amount"></div>
  <div class="form-row"><label class="form-label">備考</label><input type="text" id="ee-note"></div>
  <div class="form-row" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff8e1;border-radius:8px">
    <input type="checkbox" id="ee-initial" style="width:auto;margin:0">
    <label for="ee-initial" style="font-size:13px;color:#b45309;font-weight:600;cursor:pointer;margin:0">初期費用として扱う</label>
  </div>
  <div style="display:flex;gap:8px;margin-top:10px">
    <button class="btn primary" onclick="saveEditExp()">保存</button>
    <button class="btn" onclick="closeModal('editExpModal')">キャンセル</button>
  </div>
</div></div>

<!-- 共通経費追加 -->
<div class="modal" id="addComModal"><div class="modal-box">
  <h3>共通経費を追加</h3>
  <div class="form-grid">
    <div class="form-row"><label class="form-label">年</label><input type="number" id="ac-year" value="2024"></div>
    <div class="form-row"><label class="form-label">月</label><input type="number" id="ac-month" value="1" min="1" max="12"></div>
  </div>
  <div class="form-row"><label class="form-label">カテゴリ</label>
    <select id="ac-cat">

// 選択年度の月リストを返す（暦年 or 決算年度）
// 決算月=3の場合: 2024年度 = 2024年4月〜2025年3月
function getFiscalMonths(year){
  if(yearMode==='calendar') return MONTHS.map(m=>({year,month:m}));
  // 決算月の翌月が年度開始（例：決算月=11 → 開始月=12）
  const startM=fiscalMonth===12?1:fiscalMonth+1;
  // 開始月が12月の場合、開始年はyear-1（例：2023年度=2022年12月〜）
  const startYear=startM<=fiscalMonth?year:year-1;
  return Array.from({length:12},(_,i)=>{
    const totalMonth=startM+i;
    const m=((totalMonth-1)%12)+1;
    const y=startYear+Math.floor((totalMonth-1)/12);
    return{year:y,month:m};
  });
}
function fiscalLabel(year){
  if(yearMode==='calendar') return year+'年';
  const startM=fiscalMonth===12?1:fiscalMonth+1;
  const endM=fiscalMonth;
  return year+'年度（'+startM+'月〜'+endM+'月）';
}

// ═══ 集計 ═══
function calcML(p,r,y){const m=r/100/12,n=y*12;if(!m)return Math.round(p/n);return Math.round(p*m*Math.pow(1+m,n)/(Math.pow(1+m,n)-1));}
function normStr(s){return s.replace(/[　\s\-_【】「」『』・\/\\]/g,'').toLowerCase();}
function yen(v){return '¥'+Math.round(v).toLocaleString();}
function yenS(v){return v===0?'—':'¥'+Math.round(v).toLocaleString();}
function pc(v){return v>0?'c-grn':v<0?'c-red':'';}
function uid(){return Date.now()+'_'+Math.random().toString(36).slice(2,6);}
function ymStr(y,m){return y+'-'+(String(m).padStart(2,'0'));}

function propLoanRepay(prop,year,month){
  return(prop.loans||[]).reduce((s,loan)=>{
    if(!loan.startDate)return s;
    const start=new Date(loan.startDate),ym=year*12+month;
    const sYM=start.getFullYear()*12+(start.getMonth()+1),eYM=sYM+loan.years*12-1;
    if(ym>=sYM&&ym<=eYM)s+=calcML(loan.principal,loan.rate,loan.years);
    return s;
  },0);
}
function globalLoanRepay(year,month){
  return globalLoans.reduce((s,loan)=>{
    if(!loan.startDate)return s;
    const start=new Date(loan.startDate),ym=year*12+month;
    const sYM=start.getFullYear()*12+(start.getMonth()+1),eYM=sYM+loan.years*12-1;
    if(ym>=sYM&&ym<=eYM)s+=calcML(loan.principal,loan.rate,loan.years);
    return s;
  },0);
}
function getRent(prop,year,month){
  if(prop.type!=='sublease')return 0;
  const ym=ymStr(year,month),history=prop.rentHistory||[];
  const matched=history.filter(h=>h.from<=ym&&(!h.to||h.to>=ym));
  return matched.length?matched[matched.length-1].amount:0;
}
function rv(pid,y,m){return airbnbRows.filter(r=>r.year===y&&r.month===m&&(pid==='all'||r.propertyId===pid)).reduce((s,r)=>s+r.amount,0);}
function ex(pid,y,m){return expenses.filter(r=>r.year===y&&r.month===m&&(pid==='all'||r.propertyId===pid)&&!r.isInitial).reduce((s,r)=>s+r.amount,0);}
function exByCat(pid,y,m,cat){return expenses.filter(r=>r.year===y&&r.month===m&&(pid==='all'||r.propertyId===pid)&&r.category===cat&&!r.isInitial).reduce((s,r)=>s+r.amount,0);}
function cm(y,m){return commonExps.filter(r=>r.year===y&&r.month===m).reduce((s,r)=>s+r.amount,0);}
function ni(pid,y,m){
  // チェックイン月で集計（従来）＋月跨ぎ分を各月に分配
  return airbnbRows.filter(r=>(pid==='all'||r.propertyId===pid)).reduce((s,r)=>{
    if(!r.ci||!r.co){
      // チェックイン日がない場合は従来通り
      if(r.year===y&&r.month===m)return s+(r.nights||0);
      return s;
    }
    const ci=new Date(r.ci.replace(/\//g,'-'));
    const co=new Date(r.co.replace(/\//g,'-'));
    if(isNaN(ci.getTime())||isNaN(co.getTime())){
      if(r.year===y&&r.month===m)return s+(r.nights||0);
      return s;
    }
    // この月の1日と末日
    const mStart=new Date(y,m-1,1);
    const mEnd=new Date(y,m,0);
    // 宿泊期間とこの月の重複を計算（チェックアウト日は含まない）
    const from=ci<mStart?mStart:ci;
    const to=co>mEnd?mEnd:new Date(co.getTime()-1);// co当日は含まない
    if(from>to)return s;
    return s+Math.floor((to-from)/86400000)+1;
  },0);
}

// 月次データ生成（pid='all' or 物件ID）
function monthlyData(pid,year){
  const fiscalMons=getFiscalMonths(year);
  return fiscalMons.map(({year:y,month:m})=>{
    const R=pid==='all'?properties.reduce((s,p)=>s+rv(p.id,y,m),0):rv(pid,y,m);
    const p=pid!=='all'?properties.find(x=>x.id===pid):null;
    const rent=pid==='all'?properties.reduce((s,p)=>s+getRent(p,y,m),0):getRent(p,y,m);
    const propL=pid==='all'?properties.reduce((s,p)=>s+propLoanRepay(p,y,m),0):propLoanRepay(p,y,m);
    const GL=pid==='all'?globalLoanRepay(y,m):0;
    const C=pid==='all'?cm(y,m):0;
    const expTotal=pid==='all'?properties.reduce((s,p)=>s+ex(p.id,y,m),0):ex(pid,y,m);
    // カテゴリ別経費
    const expByCat={};
    EXP_CATS.forEach(cat=>{expByCat[cat]=pid==='all'?properties.reduce((s,p)=>s+exByCat(p.id,y,m,cat),0):exByCat(pid,y,m,cat);});
    const nights=ni(pid==='all'?'all':pid,y,m);
const daysInMonth=new Date(y,m,0).getDate();
    const now=new Date(),mStart=new Date(y,m-1,1),mEnd=new Date(y,m-1,daysInMonth);
    const effectiveEnd=now<mEnd?now:mEnd;
    const occDays=pid==='all'
      ?properties.reduce((s,p)=>{
          const sd=p.startDate?new Date(p.startDate):mStart;
          if(sd>effectiveEnd)return s;
          const from=sd>mStart?sd:mStart;
          return s+Math.max(0,Math.floor((effectiveEnd-from)/86400000)+1);
        },0)
      :(()=>{
          const p=properties.find(x=>x.id===pid);
          if(!p)return daysInMonth;
          const sd=p.startDate?new Date(p.startDate):mStart;
          if(sd>effectiveEnd)return 0;
          const from=sd>mStart?sd:mStart;
          return Math.max(0,Math.floor((effectiveEnd-from)/86400000)+1);
        })();
    const occ=occDays>0?(nights/occDays)*100:0;
    const profit=R-expTotal-rent-propL-C-GL;
    return{m,R,expTotal,expByCat,rent,propL,C,GL,nights,occ,profit};
  });
}
// 稼働率計算用の分母日数（今年なら今日まで、過去年なら年間全日数）
function daysForProp(prop,year){
  const now=new Date(),thisYear=now.getFullYear();
  const startDate=prop.startDate?new Date(prop.startDate):new Date(year,0,1);
  if(year<startDate.getFullYear())return 0;
  const rangeStart=year===startDate.getFullYear()?startDate:new Date(year,0,1);
  const rangeEnd=year===thisYear?now:new Date(year,11,31);
  if(rangeEnd<rangeStart)return 0;
  return Math.floor((rangeEnd-rangeStart)/86400000)+1;
}
function daysForOcc(pid,year){
  if(pid==='all')return properties.reduce((s,p)=>s+daysForProp(p,year),0);
  const p=properties.find(x=>x.id===pid);
  return p?daysForProp(p,year):0;
}

function yearTotal(pid,year){
  const md=monthlyData(pid,year);
  return md.reduce((a,r)=>({R:a.R+r.R,expTotal:a.expTotal+r.expTotal,rent:a.rent+r.rent,propL:a.propL+r.propL,C:a.C+r.C,GL:a.GL+r.GL,nights:a.nights+r.nights,profit:a.profit+r.profit}),{R:0,expTotal:0,rent:0,propL:0,C:0,GL:0,nights:0,profit:0});
}
function lifetimeProfit(pid){
  const years=[...new Set([...airbnbRows.map(r=>r.year),...expenses.map(r=>r.year)])];
  return years.reduce((s,y)=>s+yearTotal(pid,y).profit,0);
}

// ═══ CSV処理 ═══
const COL={
  cc:      ['確認コード','Confirmation Code','confirmation_code','Confirmation code'],
  status:  ['ステータス','Status','status'],
  type:    ['タイプ','Type','type','Transaction Type'],
  listing: ['リスティング','掲載名','Listing','listing','Listing name','物件名'],
  guest:   ['ゲスト名','ゲスト','Guest','guest','Guest name'],
  ci:      ['開始日','チェックイン','Check-in','check_in','Start date'],
  co:      ['終了日','チェックアウト','Check-out','check_out','End date'],
  nights:  ['宿泊日数','宿泊数','Nights','nights'],
  payout:  ['精算額','Payout','payout','Net amount','受取金額','Host payout'],
  amount:  ['収入','金額','Amount','amount','Gross earnings'],
  date:    ['予約済み','日付','Date','date','Payout Date'],
};
function getC(row,als){for(const a of als){if(row[a]!=null&&row[a]!=='')return row[a];}return '';}
function toNum(s){const n=parseFloat(String(s||'').replace(/[¥$,\s]/g,'').replace(/[^\d.-]/g,''));return isNaN(n)?0:n;}
function parseCSV(text){
  const s=text.charCodeAt(0)===0xFEFF?text.slice(1):text;
  const lines=s.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;continue;}
      if(line[i]===','&&!inQ){vals.push(cur);cur='';continue;}
      cur+=line[i];
    }
    vals.push(cur);
    const obj={};headers.forEach((h,i)=>{obj[h]=(vals[i]||'').trim();});return obj;
  });
}
function detectFmt(rows){
  if(!rows.length)return'reservation';
  const keys=Object.keys(rows[0]);
  if(COL.status.some(k=>keys.includes(k)))return'reservation';
  if(COL.type.some(k=>keys.includes(k)))return'transaction';
  return'reservation';
}
function matchProp(listing,aid){
  if(aid)return aid;
  const n=normStr(listing);
  const m=properties.find(p=>[p.name,...(p.keywords||[]),...(p.aliases||[])].some(x=>{if(!x)return false;const nn=normStr(x);return n.includes(nn)||nn.includes(n);}));
  return m?m.id:'';
}
async function processCSV(text,fname,aid){
  const rows=parseCSV(text);if(!rows.length)return{added:0,duplicate:0,skipped:0,fmt:'unknown'};
  const fmt=detectFmt(rows);
  const newRows=[];let dup=0,skip=0,updated=0,cancelled=0;

  for(const row of rows){
    const cc=getC(row,COL.cc),listing=getC(row,COL.listing),guest=getC(row,COL.guest),ci=getC(row,COL.ci),co=getC(row,COL.co),nights=toNum(getC(row,COL.nights)),status=getC(row,COL.status),type=getC(row,COL.type);

    const isCancel=/キャンセル|cancelled|pending|保留/i.test(status);
    let net=0;
    if(fmt==='reservation'){
      if(!isCancel) net=toNum(getC(row,COL.amount));
    }else{
      const py=toNum(getC(row,COL.payout)),am=toNum(getC(row,COL.amount));
      net=py>0?py:am;
      if(!(/予約|Reservation|Accommodation|Payout|精算/i.test(type)||net>0)||net<=0){skip++;continue;}
    }

    // 確認コードで既存データを検索
    const existing=cc?airbnbRows.find(r=>r.cc===cc):null;

    if(isCancel){
      // キャンセル：既存データがあれば削除
      if(existing){airbnbRows=airbnbRows.filter(r=>r.cc!==cc);cancelled++;}
      else skip++;
      continue;
    }

    if(net<=0){skip++;continue;}

    const d=ci?new Date(ci.replace(/\//g,'-')):new Date();
    const yr=isNaN(d.getTime())?new Date().getFullYear():d.getFullYear();
    const mo=isNaN(d.getTime())?new Date().getMonth()+1:d.getMonth()+1;
    const newRow={id:existing?.id||uid(),cc,propertyId:existing?.propertyId||matchProp(listing,aid),year:yr,month:mo,amount:net,listing,guest,ci,co,nights,status,type,src:fname,fmt,at:new Date().toISOString()};

    if(existing){
      // 変更チェック：金額・宿泊数・ステータスのいずれかが異なれば上書き
      if(existing.amount===net&&existing.nights===nights&&existing.status===status){dup++;continue;}
      airbnbRows=airbnbRows.map(r=>r.cc===cc?newRow:r);
      updated++;
    }else{
      // 確認コードなし：複合キーで重複チェック
      if(!cc){
        const compKey=`${listing}|${ci}|${guest}|${net}`;
        if(airbnbRows.some(r=>`${r.listing}|${r.ci}|${r.guest}|${r.amount}`===compKey)){dup++;continue;}
      }
      newRows.push(newRow);
    }
  }
  airbnbRows=[...airbnbRows,...newRows];
  await archiveCSV(fname,text);saveData();
  return{added:newRows.length,updated,cancelled,duplicate:dup,skipped:skip,fmt};
}

// ── 収支（CF推移）──
function renderCashflow(){
  const year=+document.getElementById('yearSel').value||new Date().getFullYear();
  const pid=currentProp;
  const md=monthlyData(pid,year);
  const yt=yearTotal(pid,year);
  const lp=lifetimeProfit(pid);
// 前年末までの累計CF（選択年より前の年のみ）
  const allYears=[...new Set([...airbnbRows.map(r=>r.year),...expenses.map(r=>r.year)])].filter(y=>y<year);
  const prevYearProfit=allYears.reduce((s,y)=>s+yearTotal(pid,y).profit,0);

  // 累計CF（月次積み上げ）
  let cumCF=prevYearProfit;
  const cumCFs=md.map(r=>{cumCF+=r.profit;return cumCF;});

  const pg=document.getElementById('pages');

  // サマリー上段
  pg.innerHTML=`
  <div class="summary-grid" style="margin-bottom:12px">
    ${[
      ['年間CF',yt.profit,true],
      ['年間売上',yt.R,false],
      ['稼働率（年）',(yt.nights/daysForOcc(pid,year)*100).toFixed(1)+'%',false,true],
      ['取得来CF累計',lp,true],
    ].map(([l,v,isProfit,isStr])=>`
    <div class="summary-item">
      <div class="summary-label">${l}</div>
      <div class="summary-val ${isStr?'':(isProfit?pc(v):'')}">
        ${isStr?v:yen(v)}
      </div>
    </div>`).join('')}
  </div>`;

  // CF推移テーブル（縦=項目、横=月）
  const hasSublease=pid==='all'?properties.some(p=>p.type==='sublease'):properties.find(p=>p.id===pid)?.type==='sublease';
  const hasGlobalLoan=globalLoans.length>0;
  const expCatsUsed=EXP_CATS.filter(cat=>MONTHS.some(m=>md[m-1].expByCat[cat]>0));

  // 行定義
  const rows=[];
  rows.push({type:'section',label:'▌ 収入'});
  rows.push({type:'data',label:'宿泊売上',vals:md.map(r=>r.R),totVal:yt.R,cls:'c-grn',bold:true});

  rows.push({type:'section',label:'▌ 支出'});
  const hasRent=md.some(r=>r.rent>0);
  if(hasRent) rows.push({type:'data',label:'家賃',vals:md.map(r=>r.rent),totVal:yt.rent,cls:'c-pur',sub:true});
  expCatsUsed.forEach(cat=>{
    rows.push({type:'data',label:cat,vals:md.map(r=>r.expByCat[cat]||0),totVal:MONTHS.reduce((s,m)=>s+(md[m-1].expByCat[cat]||0),0),cls:'c-red',sub:true});
  });
  rows.push({type:'data',label:'物件ローン返済',vals:md.map(r=>r.propL),totVal:yt.propL,cls:'c-org',sub:true});
  rows.push({type:'data',label:'共通経費',vals:md.map(r=>r.C),totVal:yt.C,cls:'c-pur',sub:true});
  if(hasGlobalLoan) rows.push({type:'data',label:'運転資金返済',vals:md.map(r=>r.GL),totVal:yt.GL,cls:'c-org',sub:true});

rows.push({type:'cf',label:'月間CF',vals:md.map(r=>r.profit),totVal:yt.profit});
  let annualCum=0;
  const annualCumCFs=md.map(r=>{annualCum+=r.profit;return annualCum;});
  rows.push({type:'cum',label:'年間CF累計',vals:annualCumCFs,totVal:null});
  rows.push({type:'cum',label:'取得来CF累計',vals:cumCFs,totVal:null});
  rows.push({type:'occ',label:'稼働率',vals:md.map(r=>r.occ),totVal:null});

  // テーブル描画
  let tbl=`<div class="card" style="padding:12px 8px"><div class="scroll-x"><table class="cf-tbl">
    <thead><tr>
      <th class="item-col">項目</th>
      ${getFiscalMonths(year).map(({month:m})=>`<th>${m}月</th>`).join('')}
      <th>年間</th>
    </tr></thead><tbody>`;

  rows.forEach(row=>{
    if(row.type==='section'){
      tbl+=`<tr class="cf-section"><td class="item-col" colspan="${14}">${row.label}</td></tr>`;return;
    }
    const isProfit=row.type==='cf'||row.type==='cum'||row.type==='lp';
    const totPos=row.totVal>0,totNeg=row.totVal<0;
    const trCls=(row.type==='cf'||row.type==='cum'||row.type==='lp')?'cf-profit':'';

    let cells='';
    if(row.vals){
      cells=row.vals.map((v,i)=>{
        if(row.type==='occ')return`<td style="color:#666">${v>0?v.toFixed(0)+'%':'—'}</td>`;
        const cls=isProfit?(v>0?'c-grn':v<0?'c-red':''):row.cls||'';
        const bold=row.type==='cf'||row.type==='cum'?'fw7':'';
        const has=md[i].R>0||md[i].expTotal>0||md[i].propL>0||md[i].rent>0||md[i].GL>0||md[i].C>0;
        const show=has&&v!==0;
        return`<td class="${cls} ${bold}">${show?yenS(v):'—'}</td>`;
      }).join('');
    }else{
      cells=MONTHS.map(()=>`<td>—</td>`).join('');
    }

    const totCell=row.type==='occ'
      ?`<td style="color:#666">${(yt.nights/daysForOcc(pid,year)*100).toFixed(0)}%</td>`
      :row.totVal===null
      ?`<td>—</td>`
      :`<td class="${isProfit?(totPos?'c-grn':totNeg?'c-red':''):row.cls||''} fw7">${row.totVal!==0?yen(row.totVal):'—'}</td>`;

    tbl+=`<tr class="${trCls}">
      <td class="item-col${row.sub?' cf-sub':''} ${row.bold?'fw7':''}">${row.label}</td>
      ${cells}${totCell}
    </tr>`;
  });

  tbl+=`</tbody></table></div></div>`;
  pg.innerHTML+=tbl;

  // 全物件ページのみ：物件別サマリー行を追加
  if(pid==='all'&&properties.length>0){
    let propTbl=`<div class="card"><div class="card-title">物件別サマリー</div><div class="scroll-x"><table class="cf-tbl">
      <thead><tr><th class="item-col">物件</th><th>タイプ</th>${getFiscalMonths(year).map(({month:m})=>`<th>${m}月</th>`).join('')}<th>年間</th></tr></thead><tbody>`;
    properties.forEach(p=>{
      const pmd=monthlyData(p.id,year);
      const pyt=yearTotal(p.id,year);
      propTbl+=`<tr>
        <td class="item-col fw7">${p.name}</td>
        <td><span class="type-badge-${p.type||'purchase'}">${p.type==='sublease'?'転貸':'購入'}</span></td>
        ${pmd.map((r,i)=>`<td class="${pc(r.profit)} fw7">${r.R>0||r.expTotal>0?yenS(r.profit):'—'}</td>`).join('')}
        <td class="${pc(pyt.profit)} fw7">${yen(pyt.profit)}</td>
      </tr>`;
    });
    propTbl+=`</tbody></table></div></div>`;
    pg.innerHTML+=propTbl;
  }

  // 明細履歴（個別物件のみ）
  if(pid!=='all') pg.innerHTML+=renderExpTable(pid,year);
}

function renderOccupancy(){

  const pg=document.getElementById('pages');
  const targets=pid==='all'?properties:properties.filter(p=>p.id===pid);

  let html='';
  targets.forEach(p=>{
    const daysTotal=daysForOcc(p.id,year);
    const totalNights=MONTHS.reduce((s,m)=>s+ni(p.id,year,m),0);
    const annualOcc=(totalNights/daysTotal*100).toFixed(1);
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:15px;font-weight:700">${p.name}</div>
        <div style="text-align:right">
          <div style="font-size:20px;font-weight:700;color:${+annualOcc>=60?'#1a7a3c':+annualOcc>=40?'#b45309':'#b71c1c'}">${annualOcc}%</div>
          <div style="font-size:11px;color:#aaa">年間稼働率（${totalNights}泊/${daysTotal}日）</div>
        </div>
      </div>
<div style="margin-top:4px">
        ${getFiscalMonths(year).map(({year:fy,month:m})=>{
          const n=ni(p.id,fy,m);
          const daysInM=new Date(fy,m,0).getDate();
          const now2=new Date(),ms2=new Date(fy,m-1,1),me2=new Date(fy,m-1,daysInM);
          const sd2=p.startDate?new Date(p.startDate):ms2;
          const occD2=sd2>me2?0:Math.max(0,Math.floor(((now2<me2?now2:me2)-(sd2>ms2?sd2:ms2))/86400000)+1);
          const rate=occD2>0?n/occD2*100:0;
          const col=rate>=60?'#4caf50':rate>=40?'#ff9800':rate>0?'#f44336':'transparent';
          const textCol=rate>=60?'#1a7a3c':rate>=40?'#b45309':rate>0?'#b71c1c':'#aaa';
          return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">

            <span style="font-size:11px;color:#aaa;width:52px;flex-shrink:0">${n>0?n+'泊/'+occD2+'日':'—'}</span>
            <div style="flex:1;height:8px;background:#f0efeb;border-radius:4px;overflow:hidden">

          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  // 取込済み予約一覧
  const filtered=airbnbRows.filter(r=>r.year===year&&(pid==='all'||r.propertyId===pid));
  html+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="card-title" style="margin-bottom:0">取込済み予約一覧</div>

    ${airbnbRows.some(r=>!r.propertyId)?'<div class="warn-banner"><b style="color:#b45309">⚠ 物件未割当のデータがあります</b><div style="font-size:12px;color:#888;margin-top:4px">「設定」→「再マッチング実行」を試してください。</div></div>':''}

// HEICをJPEGに変換
async function convertToJpeg(file){
  return new Promise((resolve)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      canvas.width=img.width;canvas.height=img.height;
      canvas.getContext('2d').drawImage(img,0,0);
      canvas.toBlob(blob=>{
        URL.revokeObjectURL(url);
        resolve(new File([blob],file.name.replace(/\.heic$/i,'.jpg'),{type:'image/jpeg'}));
      },'image/jpeg',0.92);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(file);};
    img.src=url;
  });
}

// 画像をリサイズ・圧縮（100KB以下に）
async function compressImage(file){
  return new Promise((resolve)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width,h=img.height;
      // 長辺を1500px以下に
      if(w>1500||h>1500){const r=Math.min(1500/w,1500/h);w=Math.round(w*r);h=Math.round(h*r);}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      // 品質を下げながら100KB以下になるまで試みる
      let quality=0.8;
      const tryCompress=()=>{
        canvas.toBlob(blob=>{
          URL.revokeObjectURL(url);
          if(blob.size<100*1024||quality<=0.3){
            resolve(new File([blob],file.name.replace(/\.[^.]+$/,'.jpg'),{type:'image/jpeg'}));
          }else{quality-=0.15;canvas.toBlob(b=>{URL.revokeObjectURL('');resolve(new File([b],file.name.replace(/\.[^.]+$/,'.jpg'),{type:'image/jpeg'}));
          },'image/jpeg',quality);}
        },'image/jpeg',quality);
      };
      tryCompress();
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(file);};
    img.src=url;
  });
}

async function handlePdfFiles(files){
  if(!files.length)return;
  // HEICを自動変換、画像は圧縮
  files=await Promise.all(files.map(async f=>{
    if(/\.heic$/i.test(f.name))return convertToJpeg(f);
    if(f.type.startsWith('image/'))return compressImage(f);
    return f;
  }));
  // 物件選択チェック
  let propId=document.getElementById('pdfPropSel')?.value||'';
  if(!propId){
    if(properties.length===1){
      // 物件が1つなら自動選択
      propId=properties[0].id;
      document.getElementById('pdfPropSel').value=propId;
    }else{
      const res=document.getElementById('pdfResult');
      if(res)res.innerHTML='<div style="padding:10px 12px;background:#fce8e8;border-radius:8px;color:#b71c1c;font-size:13px;font-weight:700">⚠ 対象物件を選択してください</div>';
      return;
    }
  }
  const dropText=document.getElementById('pdfDropText');
  if(dropText)dropText.textContent='解析中...';
  const pdfResult=document.getElementById('pdfResult');
  if(pdfResult)pdfResult.innerHTML='<div style="font-size:13px;color:#666;padding:8px 0">🔍 AIが書類を解析しています...</div>';

  for(const file of files){
    try{
      // base64変換
      const base64=await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(',')[1]);
        r.onerror=rej;
        r.readAsDataURL(file);
      });
      const isPdf=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
      const mediaType=isPdf?'application/pdf':(file.type||'image/jpeg');


      // Cloudflare Worker経由でClaude API呼び出し
      const year=+document.getElementById('yearSel').value||new Date().getFullYear();
      const prop=properties.find(p=>p.id===propId);
      const resp=await fetch(WORKER_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          fileBase64:base64,
          mimeType:mediaType,
          fileName:file.name,
          properties:properties.map(p=>({id:p.id,name:p.name})),
          existingFiles:[]
        })
      });
      if(!resp.ok) throw new Error('Worker応答エラー: '+resp.status);
      const text=await resp.text();
      let parsed=null;
      try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim());}catch(e){}
      try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim());}catch(e){}

      if(!parsed){
        if(pdfResult)pdfResult.innerHTML='<div style="color:#b71c1c;font-size:13px;padding:8px">解析に失敗しました。別のファイルをお試しください。</div>';
        if(dropText)dropText.textContent='PDF / 画像をドロップ / クリックして選択';
        return;
      }

      // 確認モーダルを表示
      _pendingUploadData={parsed,propId,file,base64,mediaType,isPdf};

    }catch(err){
      console.error(err);
      if(pdfResult)pdfResult.innerHTML=`<div style="color:#b71c1c;font-size:13px;padding:8px">エラー: ${err.message}</div>`;
    }
  }

}

// Driveへのファイル格納（物件フォルダ内）
async function uploadFileToDrive(file,base64,mediaType,filename,propId){
  if(!accessToken)return;
  try{
    // 物件フォルダIDを取得（なければFOLDER_ID直下）
    const prop=properties.find(p=>p.id===propId);
    let targetFolderId=FOLDER_ID;
    if(prop){
      // 物件名フォルダを探す or 作成
      const r=await gapi.client.drive.files.list({
        q:`'${FOLDER_ID}' in parents and name='${prop.name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
        fields:'files(id)',pageSize:1
      });
      if(r.result.files.length>0){
        targetFolderId=r.result.files[0].id;
      }else{
        // フォルダ作成
        const cr=await gapi.client.drive.files.create({
          resource:{name:prop.name,mimeType:'application/vnd.google-apps.folder',parents:[FOLDER_ID]},
          fields:'id'
        });
        targetFolderId=cr.result.id;
      }
    }
    // ファイルアップロード
    const byteStr=atob(base64);
    const bytes=new Uint8Array(byteStr.length);
    for(let i=0;i<byteStr.length;i++)bytes[i]=byteStr.charCodeAt(i);
    const blob=new Blob([bytes],{type:mediaType});
    const form=new FormData();
    const ext=file.name.split('.').pop();
    const uploadName=filename.endsWith('.'+ext)?filename:filename+'.'+ext;
    form.append('metadata',new Blob([JSON.stringify({name:uploadName,parents:[targetFolderId]})],{type:'application/json'}));
    form.append('file',blob);
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink',{
      method:'POST',headers:{Authorization:'Bearer '+accessToken},body:form
    });
    return await r.json();
  }catch(e){console.error('Drive upload error:',e);return null;}
}

  const aid=document.getElementById('csvPropSel')?.value||'';
  const logs=[];
  for(const f of files){if(!f.name.toLowerCase().endsWith('.csv'))continue;const r=await processCSV(await f.text(),f.name,aid);logs.push({filename:f.name,...r,time:new Date().toLocaleString('ja-JP')});}
  importLog=[...logs,...importLog];saveData();buildPropSelector();buildYearSel();
  if(dt)dt.textContent='CSVをドロップ / クリックして選択';
  const res=document.getElementById('csvResult');
  if(res)res.innerHTML=logs.map(l=>`<div style="padding:8px 12px;background:#f9f9f7;border-radius:8px;margin-bottom:6px;border:.5px solid #e0e0d8">
    <b>${l.filename}</b> <span style="font-size:11px;color:#aaa">${l.fmt==='reservation'?'予約CSV':'取引履歴CSV'}</span><br>
    <span class="c-grn">✓ ${l.added}件</span> <span class="c-org">↩ ${l.duplicate}件スキップ</span> <span class="c-gry">— ${l.skipped}件対象外</span>
  </div>`).join('');
}

// ═══ CRUD ═══
function toggleSubleaseFields(){document.getElementById('sublease-fields').style.display=document.getElementById('np-type').value==='sublease'?'':'none';}
function addProp(){
  const name=document.getElementById('np-name').value.trim();if(!name)return;
  const type=document.getElementById('np-type').value;
  const prop={id:uid(),name,type,aliases:[],keywords:[],loans:[],rentHistory:[],startDate:document.getElementById('np-start').value||''};
  if(type==='sublease'){const amt=+document.getElementById('np-rent').value,from=document.getElementById('np-rent-from').value;if(amt&&from)prop.rentHistory=[{id:uid(),from,to:null,amount:amt}];}
  properties.push(prop);saveData();buildPropSelector();closeModal('addPropModal');
  ['np-name','np-start','np-rent','np-rent-from'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  renderCurrent();
}
function setYearMode(mode){yearMode=mode;saveData();buildYearSel();showIconPage('settings');}
function setFiscalMonth(m){fiscalMonth=m;saveData();buildYearSel();showIconPage('settings');}

function updateStartDate(id,val){const p=properties.find(x=>x.id===id);if(!p)return;p.startDate=val;saveData();}
function deleteProp(id){if(!confirm('この物件を削除しますか？'))return;properties=properties.filter(p=>p.id!==id);saveData();buildPropSelector();renderCurrent();}
function addExp(){
  const pid=document.getElementById('ae-prop').value,amount=+document.getElementById('ae-amount').value;if(!pid||!amount)return;
  expenses.push({id:uid(),propertyId:pid,year:+document.getElementById('ae-year').value,month:+document.getElementById('ae-month').value,amount,category:document.getElementById('ae-cat').value,note:document.getElementById('ae-note').value,isInitial:document.getElementById('ae-initial').checked,driveFileId:null,driveLink:null,driveFileName:null,manualEntry:true});
  saveData();['ae-amount','ae-note'].forEach(id=>document.getElementById(id).value='');document.getElementById('ae-initial').checked=false;
  closeModal('addExpModal');renderCurrent();
}
function addCom(){
  const amount=+document.getElementById('ac-amount').value;if(!amount)return;
  commonExps.push({id:uid(),year:+document.getElementById('ac-year').value,month:+document.getElementById('ac-month').value,amount,category:document.getElementById('ac-cat').value,note:document.getElementById('ac-note').value});
  saveData();['ac-amount','ac-note'].forEach(id=>document.getElementById(id).value='');
  closeModal('addComModal');renderCurrent();
}
function delExp(id){expenses=expenses.filter(e=>e.id!==id);saveData();renderCurrent();}
function openEditExpModal(id){
  const e=expenses.find(x=>x.id===id);if(!e)return;
  document.getElementById('ee-id').value=id;
  document.getElementById('ee-year').value=e.year;
  document.getElementById('ee-month').value=e.month;
  document.getElementById('ee-cat').value=e.category;
  document.getElementById('ee-amount').value=e.amount;
  document.getElementById('ee-note').value=e.note||'';
  document.getElementById('ee-initial').checked=!!e.isInitial;
  openModal('editExpModal');
}
function saveEditExp(){
  const id=document.getElementById('ee-id').value;
  const e=expenses.find(x=>x.id===id);if(!e)return;
  e.year=+document.getElementById('ee-year').value;
  e.month=+document.getElementById('ee-month').value;
  e.category=document.getElementById('ee-cat').value;
  e.amount=+document.getElementById('ee-amount').value;
  e.note=document.getElementById('ee-note').value;
  e.isInitial=document.getElementById('ee-initial').checked;
  saveData();closeModal('editExpModal');renderCurrent();
}
async function attachFileToExp(expId,file){
  if(!file)return;
  const e=expenses.find(x=>x.id===expId);if(!e)return;
  const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
  const fname=e.year+String(e.month).padStart(2,'0')+(e.category?'_'+e.category:'')+file.name.slice(file.name.lastIndexOf('.'));
  const result=await uploadFileToDrive(file,base64,file.type,fname,e.propertyId);
  if(result){e.driveFileId=result.id;e.driveLink=result.webViewLink;e.driveFileName=result.name;e.manualEntry=false;saveData();renderCurrent();}
}
function delCom(id){commonExps=commonExps.filter(c=>c.id!==id);saveData();renderCurrent();}
function toggleInitial(id){const e=expenses.find(x=>x.id===id);if(!e)return;e.isInitial=!e.isInitial;saveData();renderCurrent();}
function setAirbnb_clear(){airbnbRows=[];importLog=[];saveData();renderCurrent();}

// キーワード管理
function openAliasModal(id){
  aliasTargetId=id;const p=properties.find(x=>x.id===id);if(!p)return;
  document.getElementById('aliasDesc').textContent=p.name+' のマッチングキーワードを管理します。';
  document.getElementById('newAlias').value='';renderAliasList();openModal('aliasModal');
}
function renderAliasList(){
  const p=properties.find(x=>x.id===aliasTargetId);if(!p)return;
  const kws=[...(p.keywords||[]),...(p.aliases||[])];
  document.getElementById('aliasList').innerHTML=kws.length===0
    ?'<div style="font-size:13px;color:#ccc;text-align:center;padding:10px">未登録</div>'
    :kws.map(k=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#f9f9f7;border-radius:6px;margin-bottom:6px;border:.5px solid #e0e0d8">
      <span style="font-size:13px">${k}</span>
      <button class="btn sm danger" onclick="delKeyword('${k.replace(/'/g,"\\'")}')">削除</button>
    </div>`).join('');
}
function addAlias(){const k=document.getElementById('newAlias').value.trim();if(!k)return;const p=properties.find(x=>x.id===aliasTargetId);if(!p)return;if(!p.keywords)p.keywords=[];if(!p.keywords.includes(k)&&!(p.aliases||[]).includes(k))p.keywords.push(k);saveData();document.getElementById('newAlias').value='';renderAliasList();renderCurrent();}
function delKeyword(k){const p=properties.find(x=>x.id===aliasTargetId);if(!p)return;p.keywords=(p.keywords||[]).filter(x=>x!==k);p.aliases=(p.aliases||[]).filter(x=>x!==k);saveData();renderAliasList();renderCurrent();}
function rematch(){
  let u=0;
  airbnbRows=airbnbRows.map(r=>{const m=matchProp(r.listing||'','');if(m&&m!==r.propertyId){u++;return{...r,propertyId:m};}if(!r.propertyId&&m){u++;return{...r,propertyId:m};}return r;});
  saveData();renderCurrent();alert('再マッチング完了: '+u+'件を更新しました');
}

// 家賃履歴
function openRentModal(id){
  rentTargetId=id;const p=properties.find(x=>x.id===id);if(!p)return;
  document.getElementById('rentModalDesc').textContent=p.name+' の家賃履歴';
  ['rent-from','rent-to','rent-amount'].forEach(i=>document.getElementById(i).value='');
  renderRentHistory();openModal('rentModal');
}
function renderRentHistory(){
  const p=properties.find(x=>x.id===rentTargetId);if(!p)return;
  const h=p.rentHistory||[];
  document.getElementById('rentHistoryList').innerHTML=h.length===0
    ?'<div style="font-size:13px;color:#ccc;text-align:center;padding:10px">未登録</div>'
    :h.map(r=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#f9f9f7;border-radius:6px;margin-bottom:6px;border:.5px solid #e0e0d8">
      <div><div style="font-size:13px;font-weight:700;color:#7c3aed">${yen(r.amount)}/月</div><div style="font-size:11px;color:#aaa">${r.from} 〜 ${r.to||'（永続）'}</div></div>
      <button class="btn sm danger" onclick="delRentHistory('${r.id}')">削除</button>
    </div>`).join('');
}
function addRentHistory(){
  const from=document.getElementById('rent-from').value,to=document.getElementById('rent-to').value||null,amount=+document.getElementById('rent-amount').value;
  if(!from||!amount)return;const p=properties.find(x=>x.id===rentTargetId);if(!p)return;
  p.rentHistory=[...(p.rentHistory||[]),{id:uid(),from,to,amount}];
  p.rentHistory.sort((a,b)=>a.from.localeCompare(b.from));
  saveData();renderRentHistory();renderCurrent();
  ['rent-from','rent-to','rent-amount'].forEach(i=>document.getElementById(i).value='');
}
function delRentHistory(hid){const p=properties.find(x=>x.id===rentTargetId);if(!p)return;p.rentHistory=(p.rentHistory||[]).filter(h=>h.id!==hid);saveData();renderRentHistory();renderCurrent();}

// ローン
function toggleLoanScope(){document.getElementById('loan-prop-row').style.display=document.getElementById('loan-scope').value==='overall'?'none':'';}
function openAddLoanModal(propIdOrScope){
  if(propIdOrScope==='overall'){document.getElementById('loan-scope').value='overall';document.getElementById('loan-prop-row').style.display='none';}
  else{document.getElementById('loan-scope').value='property';document.getElementById('loan-prop-row').style.display='';
    document.getElementById('loan-prop').innerHTML='<option value="">選択してください</option>'+properties.map(p=>`<option value="${p.id}"${p.id===propIdOrScope?'selected':''}>${p.name}</option>`).join('');
    if(propIdOrScope)document.getElementById('loan-prop').value=propIdOrScope;
  }
  ['loan-name','loan-principal','loan-start'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('loan-rate').value='1.8';document.getElementById('loan-years').value='20';
  openModal('addLoanModal');
}
function addLoan(){
  const scope=document.getElementById('loan-scope').value,name=document.getElementById('loan-name').value.trim(),principal=+document.getElementById('loan-principal').value,rate=+document.getElementById('loan-rate').value,years=+document.getElementById('loan-years').value,startDate=document.getElementById('loan-start').value;
  if(!name||!principal||!startDate)return;
  const loan={id:uid(),name,principal,rate,years,startDate};
  if(scope==='overall'){globalLoans=[...globalLoans,loan];}
  else{const pid=document.getElementById('loan-prop').value;if(!pid)return;const p=properties.find(x=>x.id===pid);if(!p)return;p.loans=[...(p.loans||[]),loan];}
  saveData();closeModal('addLoanModal');renderCurrent();
}
function delPropLoan(propId,loanId){const p=properties.find(x=>x.id===propId);if(!p)return;p.loans=(p.loans||[]).filter(l=>l.id!==loanId);saveData();renderCurrent();}
function delGlobalLoan(id){globalLoans=globalLoans.filter(l=>l.id!==id);saveData();renderCurrent();}

// モーダル
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('click',e=>{if(e.target.classList.contains('modal'))e.target.classList.remove('open');});

document.getElementById('addExpModal').addEventListener('click',()=>{
  const sel=document.getElementById('ae-prop');
  if(sel.options.length<=1)sel.innerHTML='<option value="">選択してください</option>'+properties.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
});
